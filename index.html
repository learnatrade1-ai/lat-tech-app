<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAT Technician Pro</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f1f5f9; color: #0f172a; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border: 1px solid #dbe4ee; border-radius: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .p-4 { padding: 16px; } .p-5 { padding: 20px; } .p-6 { padding: 24px; }
    .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
    .grid { display: grid; gap: 16px; }
    .two-col { grid-template-columns: 320px 1fr; }
    .hero-grid { grid-template-columns: 1fr 220px; }
    .btn { border: 1px solid #cbd5e1; background: #fff; color: #0f172a; border-radius: 12px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .btn:hover { background: #f8fafc; }
    .btn-primary { background: #0f172a; color: #fff; border-color: #0f172a; }
    .btn-primary:hover { background: #1e293b; }
    .btn-secondary { background: #e2e8f0; }
    .btn-ghost { background: #f8fafc; }
    .field, select, textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px 14px; font-size: 14px; background: #fff; }
    textarea { min-height: 96px; resize: vertical; }
    .title { font-size: 30px; font-weight: 800; }
    .muted { color: #64748b; }
    .library button { width: 100%; text-align: left; padding: 14px; border-radius: 14px; border: 1px solid #dbe4ee; background: #fff; cursor: pointer; }
    .library button.active { background: #0f172a; color: #fff; border-color: #0f172a; }
    .library small { display: block; margin-top: 6px; color: #64748b; }
    .library button.active small { color: #cbd5e1; }
    .tabs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .tab { border: 1px solid #cbd5e1; background: #fff; padding: 10px 8px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .tab.active { background: #0f172a; color: #fff; border-color: #0f172a; }
    .pill { display: inline-block; border: 1px solid #cbd5e1; border-radius: 999px; padding: 6px 10px; font-size: 12px; margin-right: 8px; margin-bottom: 8px; }
    .progress { width: 100%; height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress > div { height: 100%; background: #0f172a; }
    .panel { border: 1px solid #dbe4ee; border-radius: 14px; padding: 14px; background: #fff; }
    .panel-soft { background: #f8fafc; }
    .green { background: #f0fdf4; border-color: #bbf7d0; }
    .checkrow { display: flex; gap: 10px; align-items: center; border: 1px solid #dbe4ee; border-radius: 12px; padding: 12px; background: #fff; margin-bottom: 10px; }
    .list-item { border: 1px solid #dbe4ee; border-radius: 12px; padding: 12px; background: #fff; margin-bottom: 10px; }
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .decision-log { max-height: 300px; overflow: auto; }
    .small { font-size: 12px; }
    .strong { font-weight: 700; }
    @media (max-width: 900px) {
      .two-col, .hero-grid, .calc-grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(3, 1fr); }
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card p-6 mb-4">
      <div class="title">LAT Technician Pro — Commercial Beverage Equipment Troubleshooting</div>
      <div class="muted mt-2">Single-file technician app with workflows, Brix calculator, checklist, and service report export.</div>
      <div class="grid hero-grid mt-4">
        <input id="search" class="field" placeholder="Search machine, issue, or symptom" />
        <select id="machineFilter">
          <option value="all">All</option>
          <option value="Fountain Soda">Fountain Soda</option>
          <option value="Ice Machine">Ice Machine</option>
          <option value="Frozen Beverage">Frozen Beverage</option>
          <option value="Coffee / Espresso">Coffee / Espresso</option>
        </select>
      </div>
    </div>

    <div class="grid two-col">
      <div class="card p-5 library">
        <div class="strong mb-3">Workflow Library</div>
        <div id="workflowList"></div>
      </div>

      <div class="card p-6">
        <div class="tabs mb-4" id="tabs" style="grid-template-columns: repeat(9, 1fr);"></div>
        <div id="content"></div>
      </div>
    </div>
  </div>

  <script>
    const workflows = [
      { id:"fountain-no-carbonation", machineType:"Fountain Soda", issue:"No carbonation", severity:"High", eta:"10-20 min", symptoms:["Drinks are flat","No carbonator sound","Low or no CO2 pressure"], tools:["Pressure gauges","Leak detector","Basic hand tools"], parts:["CO2 regulator","Check valve","Carbonator pump","Carbonator tank switch"], notes:"Water in the CO2 line usually indicates a failed check valve.", steps:[
        { q:"Is CO2 supply present and tank open?", yes:1, no:"Restore CO2 supply or replace empty cylinder." },
        { q:"Is regulator output within target range?", yes:2, no:"Adjust or replace the regulator." },
        { q:"Is the carbonator pump running on demand?", yes:3, no:"Check pump power, overload, and pressure switch." },
        { q:"Is water backing into the CO2 line?", yes:"Replace the carbonator check valve and inspect related fittings.", no:4 },
        { q:"Are drinks still flat?", yes:"Inspect diffuser, carbonation tank leaks, and syrup or water balance.", no:"System restored. Verify carbonation at the valve." }
      ]},
      { id:"fountain-off-ratio", machineType:"Fountain Soda", issue:"Off ratio or Brix", severity:"Medium", eta:"10-15 min", symptoms:["Too sweet","Too weak","Inconsistent flavor","Customer taste complaints"], tools:["Brix cup","Stopwatch","Ratio chart"], parts:["Syrup pump","Water regulator","Valve diffuser","Nozzle"], notes:"Always take several Brix readings after making an adjustment.", steps:[
        { q:"Is water pressure within spec?", yes:1, no:"Adjust the water regulator or correct the restriction." },
        { q:"Is the syrup box empty or tubing kinked?", yes:"Replace the BIB or correct the syrup line issue.", no:2 },
        { q:"Is the syrup pump operating?", yes:3, no:"Repair the gas supply or replace the syrup pump." },
        { q:"Is the valve clean?", yes:"Adjust Brix ratio and verify with multiple pours.", no:"Clean nozzle, diffuser, and valve body." }
      ]},
      { id:"fountain-no-dispense", machineType:"Fountain Soda", issue:"No dispense at valve", severity:"High", eta:"8-15 min", symptoms:["No product","Valve silent","No water dispense"], tools:["Multimeter","Pressure gauge","Basic hand tools"], parts:["Valve solenoid","Transformer","Switch pad","Harness"], notes:"Separate electrical no-dispense from supply-side issues early.", steps:[
        { q:"Does the unit have power?", yes:1, no:"Restore power or transformer output." },
        { q:"Does the valve receive signal?", yes:2, no:"Inspect switch pad, harness, or control board." },
        { q:"Is there water or syrup supply?", yes:"Inspect valve solenoid and internal blockage.", no:"Restore water or syrup supply." }
      ]},
      { id:"fountain-carbonator-not-running", machineType:"Fountain Soda", issue:"Carbonator pump not running", severity:"High", eta:"10-15 min", symptoms:["No carbonation","Carbonator silent","Low tank pressure"], tools:["Multimeter","Pressure gauge"], parts:["Pressure switch","Carbonator pump","Relay"], notes:"Carbonator pumps commonly fail due to scale or worn motors.", steps:[
        { q:"Is the carbonator tank calling for water?", yes:1, no:"Check tank switch or float condition." },
        { q:"Is power reaching the pump?", yes:2, no:"Inspect wiring or control relay." },
        { q:"Does the pump motor run when energized?", yes:"Inspect pump head or blockage.", no:"Replace the carbonator pump." }
      ]},
      { id:"fountain-no-syrup-flow", machineType:"Fountain Soda", issue:"No syrup flow", severity:"Medium", eta:"10 min", symptoms:["Water only dispense","Weak flavor","Pump not cycling"], tools:["Pressure gauge","Basic hand tools"], parts:["Syrup pump","BIB connector","Check valve"], notes:"Always confirm BIB connectors are fully seated.", steps:[
        { q:"Is the syrup box empty?", yes:"Replace the BIB.", no:1 },
        { q:"Is gas pressure reaching the pump?", yes:2, no:"Restore CO2 or nitrogen supply." },
        { q:"Is the pump cycling during dispense?", yes:"Inspect tubing restrictions and check valves.", no:"Replace the syrup pump." }
      ]},
      { id:"ice-no-harvest", machineType:"Ice Machine", issue:"Freeze too long or no harvest", severity:"High", eta:"20-30 min", symptoms:["Long freeze cycle","Slab stuck","Harvest failure"], tools:["Thermometer","Manifold gauges","Scale cleaner tools"], parts:["Water pump","Hot gas valve","Thermistor"], notes:"Most freeze faults start with airflow, water distribution, or scale issues.", steps:[
        { q:"Is condenser clean?", yes:1, no:"Clean the condenser and restore airflow." },
        { q:"Is water flowing evenly?", yes:2, no:"Clean the distribution tube and inspect the pump." },
        { q:"Is harvest valve activating?", yes:3, no:"Check harvest solenoid, board output, and wiring." },
        { q:"Still not harvesting correctly?", yes:"Check refrigeration circuit, thermistor readings, and scale buildup.", no:"Machine operating normally. Verify several cycles." }
      ]},
      { id:"ice-no-production", machineType:"Ice Machine", issue:"No ice production", severity:"High", eta:"15-25 min", symptoms:["Machine running but no ice","No water fill","Immediate fault"], tools:["Multimeter","Water pressure gauge"], parts:["Water inlet valve","Bin switch","Control board"], notes:"Always verify water supply before deeper diagnostics.", steps:[
        { q:"Is site water supply available?", yes:1, no:"Restore water supply." },
        { q:"Is bin switch satisfied?", yes:2, no:"Check bin control circuit or obstruction." },
        { q:"Does inlet valve energize?", yes:"Inspect freeze cycle, pump operation, and refrigeration.", no:"Check valve coil, board output, and wiring." }
      ]},
      { id:"ice-thin-cubes", machineType:"Ice Machine", issue:"Thin ice cubes", severity:"Medium", eta:"15 min", symptoms:["Thin slab","Short freeze cycle","Light ice production"], tools:["Thermometer","Visual inspection"], parts:["Water valve","Water curtain","Thickness control"], notes:"Thin ice usually points to water flow or freeze timing problems.", steps:[
        { q:"Is water flow correct across the evaporator?", yes:1, no:"Clean the distribution tube or correct water flow." },
        { q:"Is freeze cycle length normal?", yes:"Check refrigeration charge or heat load.", no:"Adjust or inspect the ice thickness control." }
      ]},
      { id:"ice-water-overflow", machineType:"Ice Machine", issue:"Water overflowing", severity:"Medium", eta:"10 min", symptoms:["Water spilling from reservoir","Continuous fill","Overflow during startup"], tools:["Visual inspection","Basic hand tools"], parts:["Float","Water inlet valve"], notes:"Mineral buildup commonly causes floats and valves to stick.", steps:[
        { q:"Is the float switch stuck?", yes:"Clean or replace the float.", no:1 },
        { q:"Is the inlet valve closing properly?", yes:"Inspect the drain or reservoir condition.", no:"Replace the inlet valve." }
      ]},
      { id:"frozen-no-freeze", machineType:"Frozen Beverage", issue:"Product not freezing", severity:"High", eta:"20-30 min", symptoms:["Liquid product","Warm barrel","Weak slush"], tools:["Clamp meter","Thermometer","Refrigeration gauges"], parts:["Beater motor","Fan motor","Thermistor"], notes:"Airflow issues cause many freeze complaints before sealed system faults do.", steps:[
        { q:"Is condenser fan running?", yes:1, no:"Repair the fan or airflow issue." },
        { q:"Is beater motor turning?", yes:2, no:"Repair drive system, motor, or coupler." },
        { q:"Are sensors reading correctly?", yes:"Check refrigeration system performance.", no:"Replace the thermistor or faulty sensor." }
      ]},
      { id:"frozen-low-product", machineType:"Frozen Beverage", issue:"Low product flow", severity:"Medium", eta:"10-20 min", symptoms:["Slow dispense","Thin product","Pump noise"], tools:["Pressure gauge","Basic hand tools"], parts:["Syrup pump","Check valve","Tubing"], notes:"Low syrup pressure is common in frozen beverage machines.", steps:[
        { q:"Is syrup supply available?", yes:1, no:"Replace the BIB." },
        { q:"Is the pump receiving gas pressure?", yes:2, no:"Restore gas supply." },
        { q:"Is tubing restricted?", yes:"Clear or replace tubing.", no:"Inspect the internal pump." }
      ]},
      { id:"frozen-overfreeze", machineType:"Frozen Beverage", issue:"Barrel over-freezing", severity:"High", eta:"15-20 min", symptoms:["Product too thick","Motor strain","Ice buildup"], tools:["Thermometer","Brix cup"], parts:["Thermistor","Control board"], notes:"Incorrect Brix ratios often cause overfreeze conditions.", steps:[
        { q:"Is product Brix within spec?", yes:1, no:"Adjust the Brix ratio." },
        { q:"Is the barrel temperature sensor accurate?", yes:"Inspect the control board and settings.", no:"Replace the thermistor or probe." }
      ]},
      { id:"coffee-low-flow", machineType:"Coffee / Espresso", issue:"Low water flow", severity:"Medium", eta:"10-20 min", symptoms:["Slow dispense","Weak rinse flow","Pump strain noise"], tools:["Pressure gauge","TDS meter","Basic hand tools"], parts:["Filter cartridge","Inlet solenoid","Flowmeter","Pump"], notes:"Filters and RO settings can affect both flow and drink quality.", steps:[
        { q:"Is incoming water supply turned on and pressure adequate?", yes:1, no:"Restore site water supply and correct pressure." },
        { q:"Is the filter or RO system restricted?", yes:"Replace filter or RO cartridges, verify blend settings, and flush the system.", no:2 },
        { q:"Is the inlet solenoid opening during demand?", yes:3, no:"Check coil voltage, blockage, and valve condition." },
        { q:"Is the flowmeter registering?", yes:"Inspect the pump and internal restrictions.", no:"Clean or replace the flowmeter." }
      ]},
      { id:"coffee-no-heat", machineType:"Coffee / Espresso", issue:"No heat or low brew temperature", severity:"High", eta:"15-25 min", symptoms:["Cold beverages","Ready light off","Slow recovery"], tools:["Multimeter","Thermometer"], parts:["Heating element","Hi-limit","Temperature probe","Relay"], notes:"Scale buildup and failing probes can mimic heater failure on coffee equipment.", steps:[
        { q:"Does the unit have proper incoming power?", yes:1, no:"Restore correct electrical supply and verify voltage." },
        { q:"Is the hi-limit open or tripped?", yes:"Reset or replace the hi-limit after finding the root cause.", no:2 },
        { q:"Does the heating element energize?", yes:3, no:"Check relay, wiring, and board output." },
        { q:"Is the temperature probe reading correctly?", yes:"Inspect control logic and scale-related heating issues.", no:"Replace the faulty probe or sensor." }
      ]},
      { id:"coffee-grinder-jammed", machineType:"Coffee / Espresso", issue:"Grinder jammed", severity:"Medium", eta:"10 min", symptoms:["Grinding noise","No coffee dispense","Motor hum"], tools:["Brush","Vacuum","Basic hand tools"], parts:["Grinder burrs","Grinder motor"], notes:"Oily beans frequently cause grinder jams.", steps:[
        { q:"Are beans stuck in the burrs?", yes:"Clean the grinder burrs and chute.", no:1 },
        { q:"Are burrs worn out?", yes:"Replace the burr set.", no:"Check the grinder motor and capacitor if applicable." }
      ]}
    ];

    const checklistItems = [
      ["power", "Verify power to equipment"],
      ["water", "Verify incoming water supply"],
      ["gas", "Verify CO2 or gas supply if applicable"],
      ["condenser", "Check and clean condenser or airflow path"],
      ["readings", "Document pressures, temperatures, or key readings"]
    ];

    const state = {
      co2: { equipment:'fountain', temperature:'38', elevation:'0' },
      iceDiag: { brand:'manitowoc', symptom:'freeze-too-long' } ,
      filter: 'all',
      query: '',
      selectedId: workflows[0].id,
      tab: 'workflow',
      stepIndex: 0,
      history: [],
      checklist: { power:false, water:false, gas:false, condenser:false, readings:false },
      brix: { syrup:'5', water:'1', target:'5.0' },
      service: { co2:'100', water:'70', syrupGas:'75' },
      site: { customer:'', store:'', model:'', serial:'', complaint:'', readings:'', resolution:'' }
    };

    const tabs = [
      ['workflow','Workflow'], ['symptoms','Symptoms'], ['tools','Tools'], ['checklist','Checklist'], ['calc','Brix Calc'], ['co2','CO2 Tool'], ['iceDiag','Ice Diag'], ['notes','Notes'], ['report','Report']
    ];

    function filteredWorkflows() {
      return workflows.filter(w => {
        const machine = state.filter === 'all' || w.machineType === state.filter;
        const q = state.query.trim().toLowerCase();
        const match = !q || w.machineType.toLowerCase().includes(q) || w.issue.toLowerCase().includes(q) || w.symptoms.join(' ').toLowerCase().includes(q);
        return machine && match;
      });
    }

    function currentWorkflow() {
      const list = filteredWorkflows();
      return list.find(w => w.id === state.selectedId) || list[0] || workflows[0];
    }

    function renderLibrary() {
      const list = filteredWorkflows();
      document.getElementById('workflowList').innerHTML = list.map(w => `
        <button class="${state.selectedId===w.id?'active':''}" onclick="selectWorkflow('${w.id}')">
          <div class="strong">${w.issue}</div>
          <small>${w.machineType} • ${w.eta}</small>
        </button>
      `).join('');
    }

    function renderTabs() {
      document.getElementById('tabs').innerHTML = tabs.map(t => `
        <button class="tab ${state.tab===t[0]?'active':''}" onclick="setTab('${t[0]}')">${t[1]}</button>
      `).join('');
    }

    function resetFlow() { state.stepIndex = 0; state.history = []; render(); }

    function backFlow() {
      const trimmed = state.history.filter(i => !i.result).slice(0, -1);
      state.history = trimmed;
      state.stepIndex = trimmed.length === 0 ? 0 : Math.max(trimmed.length - 1, 0);
      render();
    }

    function answerFlow(type) {
      const workflow = currentWorkflow();
      const current = workflow.steps[state.stepIndex];
      const next = current[type];
      const log = state.history.filter(i => !i.result).concat([{ question: current.q, answer: type.toUpperCase() }]);
      if (typeof next === 'number') {
        state.history = log;
        state.stepIndex = next;
      } else {
        state.history = log.concat([{ result: next }]);
      }
      render();
    }

    function exportReport() {
      const s = state.site;
      const text = `SERVICE REPORT\n\nCustomer: ${s.customer}\nStore: ${s.store}\nMachine: ${s.model}\nSerial: ${s.serial}\nComplaint: ${s.complaint}\n\nResolution:\n${s.resolution}\n\nReadings:\n${s.readings}\n`;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'service-report.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    function renderContent() {
      const w = currentWorkflow();
      const finalResult = state.history.length && state.history[state.history.length - 1].result;
      const current = w.steps[state.stepIndex];
      const progress = finalResult ? 100 : Math.round(((state.stepIndex + 1) / w.steps.length) * 100);
      let html = '';

      if (state.tab === 'workflow') {
        html = `
          <div class="mb-3">
            <span class="pill">${w.machineType}</span>
            <span class="pill">${w.severity}</span>
            <span class="pill">${w.eta}</span>
          </div>
          <div class="panel mb-4">
            <div class="topbar mb-3"><div class="strong small">Guided Troubleshooting</div><div class="small muted">${progress}%</div></div>
            <div class="progress"><div style="width:${progress}%"></div></div>
            ${!finalResult ? `
              <div class="mt-4 strong">${current.q}</div>
              <div class="mt-4" style="display:flex;gap:12px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="answerFlow('yes')">Yes</button>
                <button class="btn" onclick="answerFlow('no')">No</button>
                <button class="btn btn-ghost" onclick="resetFlow()">Reset</button>
                <button class="btn btn-secondary" onclick="backFlow()">Back</button>
              </div>
            ` : `
              <div class="panel green mt-4">
                <div class="strong" style="color:#15803d;">Recommended Action</div>
                <div class="mt-2">${finalResult}</div>
              </div>
              <div class="mt-4"><button class="btn btn-primary" onclick="resetFlow()">Start Over</button></div>
            `}
          </div>
          <div class="panel panel-soft">
            <div class="strong small mb-3">Decision Log</div>
            <div class="decision-log">
              ${state.history.length ? state.history.map(item => `
                <div class="list-item">
                  ${item.question ? `<div class="strong">${item.question}</div><div class="muted small mt-2">Answer: ${item.answer}</div>` : ''}
                  ${item.result ? `<div>${item.result}</div>` : ''}
                </div>
              `).join('') : `<div class="muted small">No decisions yet.</div>`}
            </div>
          </div>
        `;
      }

      if (state.tab === 'symptoms') {
        html = w.symptoms.map(s => `<div class="list-item">${s}</div>`).join('');
      }

      if (state.tab === 'tools') {
        html = `
          <div class="grid calc-grid">
            <div>
              <div class="strong mb-3">Tools</div>
              ${w.tools.map(t => `<div class="list-item">${t}</div>`).join('')}
            </div>
            <div>
              <div class="strong mb-3">Likely Parts</div>
              ${w.parts.map(p => `<div class="list-item">${p}</div>`).join('')}
            </div>
          </div>
        `;
      }

      if (state.tab === 'checklist') {
        html = checklistItems.map(([k,l]) => `
          <label class="checkrow"><input type="checkbox" ${state.checklist[k]?'checked':''} onchange="toggleChecklist('${k}')" /> <span>${l}</span></label>
        `).join('');
      }

      if (state.tab === 'calc') {
        const syrup = Number(state.brix.syrup)||0;
        const water = Number(state.brix.water)||0;
        const target = Number(state.brix.target)||0;
        const actualRatio = water === 0 ? 0 : syrup / water;
        const targetRatio = target === 0 ? 0 : 1 / target;
        let status = 'Enter a water value greater than 0.';
        if (water > 0) {
          if (Math.abs(actualRatio - targetRatio) < 0.001) status = 'On target';
          else if (actualRatio > targetRatio) status = 'Too strong or syrup-heavy';
          else status = 'Too weak or water-heavy';
        }
        html = `
          <div class="calc-grid">
            <div class="panel">
              <div class="strong mb-3">Brix Ratio Calculator</div>
              <input class="field mb-3" placeholder="Syrup ounces" value="${state.brix.syrup}" oninput="updateBrix('syrup', this.value)" />
              <input class="field mb-3" placeholder="Water ounces" value="${state.brix.water}" oninput="updateBrix('water', this.value)" />
              <input class="field" placeholder="Target ratio denominator, for example 5.0" value="${state.brix.target}" oninput="updateBrix('target', this.value)" />
              <div class="panel panel-soft mt-4">
                <div><span class="strong">Actual syrup to water ratio:</span> ${actualRatio.toFixed(3)}</div>
                <div class="mt-2"><span class="strong">Target syrup to water ratio:</span> ${targetRatio.toFixed(3)}</div>
                <div class="mt-2"><span class="strong">Status:</span> ${status}</div>
              </div>
            </div>
            <div class="panel">
              <div class="strong mb-3">Quick Field Reference</div>
              <div class="list-item"><span class="strong">CO2 pressure:</span> ${state.service.co2} PSI typical starting point</div>
              <div class="list-item"><span class="strong">Water pressure:</span> ${state.service.water} PSI common field range</div>
              <div class="list-item"><span class="strong">Syrup gas pressure:</span> ${state.service.syrupGas} PSI common pump setting</div>
              <div class="list-item"><span class="strong">Reminder:</span> Always verify exact OEM specs for the machine being serviced.</div>
              <div class="grid" style="grid-template-columns:repeat(3,1fr);margin-top:12px;">
                <input class="field" placeholder="CO2 PSI" value="${state.service.co2}" oninput="updateService('co2', this.value)" />
                <input class="field" placeholder="Water PSI" value="${state.service.water}" oninput="updateService('water', this.value)" />
                <input class="field" placeholder="Syrup gas PSI" value="${state.service.syrupGas}" oninput="updateService('syrupGas', this.value)" />
              </div>
            </div>
          </div>
        `;
      }

      if (state.tab === 'co2') {
        const temp = Number(state.co2.temperature) || 38;
        const elevation = Number(state.co2.elevation) || 0;
        const equipmentMap = {
          fountain: { label: 'Fountain Carbonator', range: '75-95 PSI', base: 90, note: 'Use OEM specs when available. Beverage quality, temperature, and carbonator design matter.' },
          frozen: { label: 'Frozen Beverage Syrup Pump / Gas', range: '55-65 PSI', base: 60, note: 'Many frozen beverage systems use regulated gas around 60 PSI.' },
          draft: { label: 'Draft Beverage', range: '12-14 PSI', base: 13, note: 'Serving pressure depends on line length, temperature, and beverage style.' },
          nitro: { label: 'Nitro / Specialty Beverage', range: '30-40 PSI', base: 35, note: 'Nitro and specialty beverages vary by manufacturer setup.' }
        };
        const entry = equipmentMap[state.co2.equipment] || equipmentMap.fountain;
        const tempAdjust = temp > 40 ? 2 : temp < 36 ? -2 : 0;
        const elevAdjust = elevation >= 3000 ? 2 : elevation >= 1500 ? 1 : 0;
        const suggested = (entry.base + tempAdjust + elevAdjust).toFixed(0);
        html = `
          <div class="calc-grid">
            <div class="panel">
              <div class="strong mb-3">CO2 Pressure Reference Tool</div>
              <select class="field mb-3" onchange="updateCo2('equipment', this.value)">
                <option value="fountain" ${state.co2.equipment==='fountain'?'selected':''}>Fountain Carbonator</option>
                <option value="frozen" ${state.co2.equipment==='frozen'?'selected':''}>Frozen Beverage</option>
                <option value="draft" ${state.co2.equipment==='draft'?'selected':''}>Draft Beverage</option>
                <option value="nitro" ${state.co2.equipment==='nitro'?'selected':''}>Nitro / Specialty Beverage</option>
              </select>
              <input class="field mb-3" placeholder="Beverage / cabinet temp °F" value="${state.co2.temperature}" oninput="updateCo2('temperature', this.value)" />
              <input class="field" placeholder="Elevation in feet" value="${state.co2.elevation}" oninput="updateCo2('elevation', this.value)" />
              <div class="panel panel-soft mt-4">
                <div><span class="strong">Equipment:</span> ${entry.label}</div>
                <div class="mt-2"><span class="strong">Typical range:</span> ${entry.range}</div>
                <div class="mt-2"><span class="strong">Suggested starting point:</span> ${suggested} PSI</div>
                <div class="mt-2"><span class="strong">Note:</span> ${entry.note}</div>
              </div>
            </div>
            <div class="panel">
              <div class="strong mb-3">Quick Field CO2 Notes</div>
              <div class="list-item">Flat drinks can be caused by low CO2 pressure, warm product, water in the CO2 line, or a failed carbonator check valve.</div>
              <div class="list-item">Overcarbonation can show up as excess foaming, aggressive fizz, or taste complaints.</div>
              <div class="list-item">Always verify regulator output under actual system demand when possible.</div>
              <div class="list-item">Use machine-specific OEM targets whenever available. This tool is a field reference, not a factory spec replacement.</div>
            </div>
          </div>
        `;
      }

      if (state.tab === 'iceDiag') {
        const map = {
          'freeze-too-long': {
            title: 'Freeze Too Long',
            causes: ['Dirty condenser', 'Restricted water flow', 'Scale on evaporator', 'Low refrigerant charge', 'Hot gas valve leaking']
          },
          'harvest-too-long': {
            title: 'Harvest Too Long',
            causes: ['Hot gas valve issue', 'Scale causing slab hang-up', 'Weak harvest assist', 'Improper water curtain action', 'Thermistor / board timing issue']
          },
          'thin-ice': {
            title: 'Thin Ice',
            causes: ['Short freeze cycle', 'Water flow issue', 'Ice thickness control adjustment', 'High ambient load', 'Weak refrigeration performance']
          },
          'no-water-fill': {
            title: 'No Water Fill',
            causes: ['Water supply off', 'Plugged inlet screen', 'Failed inlet valve coil', 'Board not sending output', 'Float / sensor lockout']
          },
          'overflow': {
            title: 'Water Overflow',
            causes: ['Float stuck', 'Inlet valve leaking through', 'Drain restriction', 'Improper reservoir level control', 'Scale buildup']
          }
        };
        const brands = {
          manitowoc: 'Manitowoc',
          hoshizaki: 'Hoshizaki',
          scotsman: 'Scotsman',
          generic: 'Generic Ice Machine'
        };
        const entry = map[state.iceDiag.symptom] || map['freeze-too-long'];
        html = `
          <div class="calc-grid">
            <div class="panel">
              <div class="strong mb-3">Ice Machine Diagnostic Assistant</div>
              <select class="field mb-3" onchange="updateIceDiag('brand', this.value)">
                <option value="manitowoc" ${state.iceDiag.brand==='manitowoc'?'selected':''}>Manitowoc</option>
                <option value="hoshizaki" ${state.iceDiag.brand==='hoshizaki'?'selected':''}>Hoshizaki</option>
                <option value="scotsman" ${state.iceDiag.brand==='scotsman'?'selected':''}>Scotsman</option>
                <option value="generic" ${state.iceDiag.brand==='generic'?'selected':''}>Generic Ice Machine</option>
              </select>
              <select class="field" onchange="updateIceDiag('symptom', this.value)">
                <option value="freeze-too-long" ${state.iceDiag.symptom==='freeze-too-long'?'selected':''}>Freeze Too Long</option>
                <option value="harvest-too-long" ${state.iceDiag.symptom==='harvest-too-long'?'selected':''}>Harvest Too Long</option>
                <option value="thin-ice" ${state.iceDiag.symptom==='thin-ice'?'selected':''}>Thin Ice</option>
                <option value="no-water-fill" ${state.iceDiag.symptom==='no-water-fill'?'selected':''}>No Water Fill</option>
                <option value="overflow" ${state.iceDiag.symptom==='overflow'?'selected':''}>Water Overflow</option>
              </select>
              <div class="panel panel-soft mt-4">
                <div><span class="strong">Brand family:</span> ${brands[state.iceDiag.brand]}</div>
                <div class="mt-2"><span class="strong">Symptom:</span> ${entry.title}</div>
              </div>
            </div>
            <div class="panel">
              <div class="strong mb-3">Most Likely Causes</div>
              ${entry.causes.map(c => `<div class="list-item">${c}</div>`).join('')}
              <div class="list-item"><span class="strong">Field tip:</span> Start with airflow, water flow, scale, and sensor checks before assuming sealed system failure.</div>
            </div>
          </div>
        `;
      }

      if (state.tab === 'notes') {
        html = `
          <div class="panel mb-4">${w.notes}</div>
          <div class="panel panel-soft">
            <div class="list-item">Confirm model-specific OEM specs before final adjustment.</div>
            <div class="list-item">Water quality, pressure, and filtration affect many beverage complaints.</div>
            <div class="list-item">Airflow and cleanliness checks should happen early on cooling-related calls.</div>
            <div class="list-item">Document temperatures, pressures, and timing before and after the repair.</div>
          </div>
        `;
      }

      if (state.tab === 'report') {
        html = `
          <input class="field mb-3" placeholder="Customer" value="${state.site.customer}" oninput="updateSite('customer', this.value)" />
          <input class="field mb-3" placeholder="Store" value="${state.site.store}" oninput="updateSite('store', this.value)" />
          <input class="field mb-3" placeholder="Machine model" value="${state.site.model}" oninput="updateSite('model', this.value)" />
          <input class="field mb-3" placeholder="Serial" value="${state.site.serial}" oninput="updateSite('serial', this.value)" />
          <textarea class="mb-3" placeholder="Complaint" oninput="updateSite('complaint', this.value)">${state.site.complaint}</textarea>
          <textarea class="mb-3" placeholder="Field readings" oninput="updateSite('readings', this.value)">${state.site.readings}</textarea>
          <textarea class="mb-3" placeholder="Resolution" oninput="updateSite('resolution', this.value)">${state.site.resolution}</textarea>
          <button class="btn btn-primary" onclick="exportReport()">Export Service Report</button>
        `;
      }

      document.getElementById('content').innerHTML = html;
    }

    function setTab(tab) { state.tab = tab; render(); }
    function selectWorkflow(id) { state.selectedId = id; state.stepIndex = 0; state.history = []; render(); }
    function toggleChecklist(key) { state.checklist[key] = !state.checklist[key]; }
    function updateBrix(key, value) { state.brix[key] = value; render(); }
    function updateService(key, value) { state.service[key] = value; render(); }
    function updateSite(key, value) { state.site[key] = value; }
    function updateCo2(key, value) { state.co2[key] = value; render(); }
    function updateIceDiag(key, value) { state.iceDiag[key] = value; render(); }

    function render() {
      const visible = filteredWorkflows();
      if (!visible.some(w => w.id === state.selectedId) && visible[0]) state.selectedId = visible[0].id;
      renderLibrary();
      renderTabs();
      renderContent();
    }

    document.getElementById('search').addEventListener('input', (e) => { state.query = e.target.value; render(); });
    document.getElementById('machineFilter').addEventListener('change', (e) => { state.filter = e.target.value; render(); });

    render();
  </script>
</body>
</html>
